name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/ui/**"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Check if version changed
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/ui/package.json').version")
          REMOTE_VERSION=$(npm view @bravinta/ui version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $REMOTE_VERSION -> $LOCAL_VERSION"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $LOCAL_VERSION"
          fi

      - run: pnpm install --frozen-lockfile
        if: steps.check.outputs.should_publish == 'true'

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @bravinta/ui publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
